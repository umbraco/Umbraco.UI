name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - nightly
      version:
        description: 'Base version for nightly (e.g. 2.0.0). Ignored for prerelease.'
        required: false
        type: string

env:
  NODE_OPTIONS: --max_old_space_size=16384

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # pulls all commits (needed for lerna / semantic release to correctly version)
          fetch-depth: '0'

      - name: Cache build setup
        uses: actions/cache@v5
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cache-

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          check-latest: true
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm -v
      - run: npm install

      - name: Authenticate with Registry
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.UMBRACO_PUBLISH_NPM_TOKEN }}

      - name: Publish package
        run: npm run build:prod && npm whoami && lerna publish from-package --yes --pre-dist-tag ${{ inputs.dist-tag || 'prerelease' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.UMBRACO_PUBLISH_NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
